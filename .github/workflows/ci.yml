name: CI Pipeline

on:
push:
branches:
- main

pull_request:
branches:
- main

jobs:

test:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install Dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
      pip install flake8 httpx pytest

  - name: Run Lint
    run: |
      flake8 app tests

  - name: Run Tests
    env:
      PYTHONPATH: ${{ github.workspace }}
    run: |
      pytest -v
```

checkov:
needs: test

```
runs-on: ubuntu-latest

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Run Checkov
    uses: bridgecrewio/checkov-action@master
    with:
      directory: .
      framework: terraform,dockerfile
```

docker:
needs: checkov

```
runs-on: ubuntu-latest

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Build Docker Image
    run: |
      docker build -t sample-fastapi-app:${{ github.sha }} .

  - name: Run Trivy Scan
    uses: aquasecurity/trivy-action@master
    with:
      image-ref: sample-fastapi-app:${{ github.sha }}
      format: table
      exit-code: 1
      severity: CRITICAL,HIGH
```
