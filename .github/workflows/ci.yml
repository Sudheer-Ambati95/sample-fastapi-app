name: CI Pipeline

on:
  push:
  pull_request:

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Lint
        run: |
          flake8 app tests

      - name: Run Tests
        run: |
          pytest

  docker:

    runs-on: ubuntu-latest

    needs: test

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t sample-fastapi-app:${{ github.sha }} .
